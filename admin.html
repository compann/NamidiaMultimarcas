<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — Na Mídia Multimarcas</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Gloock&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body class="admin-body">

<!-- TELA DE LOGIN -->
<div class="login-box" id="login-box">
  <img id="selo-login" alt="Na Mídia Multimarcas">
  <h1>NA MÍDIA</h1>
  <p class="sub">painel administrativo</p>
  <label for="login-email">E-mail</label>
  <input type="text" id="login-email" autocomplete="username">
  <label for="login-senha">Senha</label>
  <input type="text" id="login-senha" autocomplete="current-password" style="-webkit-text-security:disc;text-security:disc">
  <button class="btn-gold" id="btn-login">Entrar</button>
  <p class="login-erro" id="login-erro"></p>
</div>

<!-- DASHBOARD -->
<div class="admin-shell" id="admin-shell">
  <div class="admin-top">
    <div class="who">
      <img id="selo-top" alt="">
      <div>
        <h1>Painel Na Mídia</h1>
        <div class="email" id="user-email"></div>
      </div>
    </div>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </div>

  <div class="admin-grid">

    <!-- FORMULÁRIO -->
    <div class="painel">
      <h2 id="form-titulo">Nova camiseta</h2>

      <div class="field">
        <label>Foto do produto</label>
        <div class="upload-area" id="upload-area">Clique para escolher uma foto</div>
        <input type="file" id="input-foto" accept="image/*" style="display:none">
        <img id="preview-img" class="preview-img" alt="Pré-visualização">
      </div>

      <div class="field">
        <label for="f-nome">Nome da camiseta</label>
        <input type="text" id="f-nome" placeholder="Ex.: Camiseta Oversized Onyx">
      </div>

      <div class="field">
        <label for="f-categoria">Categoria</label>
        <input type="text" id="f-categoria" placeholder="Ex.: Oversized, Premium, Básica">
      </div>

      <div class="field">
        <label for="f-preco">Preço (R$)</label>
        <input type="number" id="f-preco" step="0.01" min="0" placeholder="129.90">
      </div>

      <div class="field">
        <label>Tamanhos disponíveis</label>
        <div class="size-row" id="f-tamanhos">
          <button type="button" class="size-opt" data-t="P">P</button>
          <button type="button" class="size-opt" data-t="M">M</button>
          <button type="button" class="size-opt" data-t="G">G</button>
          <button type="button" class="size-opt" data-t="GG">GG</button>
          <button type="button" class="size-opt" data-t="G1">G1</button>
        </div>
      </div>

      <p class="form-erro" id="form-erro"></p>
      <p class="form-ok" id="form-ok"></p>

      <button class="btn-salvar" id="btn-salvar">Publicar no catálogo</button>
      <button class="btn-cancelar" id="btn-cancelar" style="display:none">Cancelar edição</button>
    </div>

    <!-- LISTA -->
    <div class="painel">
      <h2>Camisetas no catálogo</h2>
      <div class="lista-produtos" id="lista-produtos">
        <p class="vazio">Carregando…</p>
      </div>
    </div>

  </div>
</div>

const BUCKET = "produtos"; // nome do bucket no Supabase Storage

let editandoId = null;
let arquivoFoto = null;

// ---------- LOGIN ----------
const loginBox = document.getElementById("login-box");
const shell = document.getElementById("admin-shell");

async function checarSessao(){
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session){
    mostrarDashboard(session.user);
  }
}
checarSessao();

document.getElementById("btn-login").onclick = async ()=>{
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;
  const erro = document.getElementById("login-erro");
  erro.textContent = "";
  if(!email || !senha){
    erro.textContent = "Preencha e-mail e senha.";
    return;
  }
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: senha });
  if (error){
    erro.textContent = "E-mail ou senha incorretos.";
    return;
  }
  mostrarDashboard(data.user);
};

document.getElementById("btn-sair").onclick = async ()=>{
  await supabaseClient.auth.signOut();
  shell.classList.remove("open");
  loginBox.style.display = "block";
};

function mostrarDashboard(user){
  loginBox.style.display = "none";
  shell.classList.add("open");
  document.getElementById("user-email").textContent = user.email;
  carregarLista();
}

// ---------- UPLOAD DE FOTO ----------
const uploadArea = document.getElementById("upload-area");
const inputFoto = document.getElementById("input-foto");
const previewImg = document.getElementById("preview-img");

uploadArea.onclick = ()=> inputFoto.click();
inputFoto.onchange = ()=>{
  const file = inputFoto.files[0];
  if(!file) return;
  arquivoFoto = file;
  const reader = new FileReader();
  reader.onload = e=>{
    previewImg.src = e.target.result;
    previewImg.style.display = "block";
  };
  reader.readAsDataURL(file);
};

async function fazerUploadFoto(){
  if(!arquivoFoto) return null;
  const ext = arquivoFoto.name.split(".").pop();
  const nomeArquivo = `${crypto.randomUUID()}.${ext}`;
  const { error } = await supabaseClient.storage.from(BUCKET).upload(nomeArquivo, arquivoFoto);
  if(error){
    console.error(error);
    return null;
  }
  const { data } = supabaseClient.storage.from(BUCKET).getPublicUrl(nomeArquivo);
  return data.publicUrl;
}

// ---------- TAMANHOS (seleção múltipla) ----------
const tamanhosSel = new Set();
document.querySelectorAll("#f-tamanhos .size-opt").forEach(btn=>{
  btn.onclick = ()=>{
    const t = btn.dataset.t;
    if(tamanhosSel.has(t)){ tamanhosSel.delete(t); btn.classList.remove("sel"); }
    else { tamanhosSel.add(t); btn.classList.add("sel"); }
  };
});

function limparFormulario(){
  editandoId = null;
  arquivoFoto = null;
  document.getElementById("form-titulo").textContent = "Nova camiseta";
  document.getElementById("f-nome").value = "";
  document.getElementById("f-categoria").value = "";
  document.getElementById("f-preco").value = "";
  previewImg.style.display = "none";
  previewImg.src = "";
  inputFoto.value = "";
  tamanhosSel.clear();
  document.querySelectorAll("#f-tamanhos .size-opt").forEach(b=>b.classList.remove("sel"));
  document.getElementById("form-erro").classList.remove("show");
  document.getElementById("form-ok").classList.remove("show");
  document.getElementById("btn-cancelar").style.display = "none";
  document.getElementById("btn-salvar").textContent = "Publicar no catálogo";
}

document.getElementById("btn-cancelar").onclick = limparFormulario;

// ---------- SALVAR (criar ou editar) ----------
document.getElementById("btn-salvar").onclick = async ()=>{
  const erroEl = document.getElementById("form-erro");
  const okEl = document.getElementById("form-ok");
  erroEl.classList.remove("show");
  okEl.classList.remove("show");

  const nome = document.getElementById("f-nome").value.trim();
  const categoria = document.getElementById("f-categoria").value.trim() || "Geral";
  const preco = parseFloat(document.getElementById("f-preco").value);

  if(!nome || isNaN(preco) || preco <= 0 || tamanhosSel.size === 0){
    erroEl.textContent = "Preencha nome, preço e ao menos um tamanho.";
    erroEl.classList.add("show");
    return;
  }

  const btn = document.getElementById("btn-salvar");
  btn.disabled = true;
  btn.textContent = "Salvando…";

  let imagem_url = null;
  if (arquivoFoto) {
    imagem_url = await fazerUploadFoto();
  }

  const payload = {
    nome,
    categoria,
    preco,
    tamanhos: [...tamanhosSel],
    ativo: true
  };
  if (imagem_url) payload.imagem_url = imagem_url;

  let error;
  if (editandoId) {
    ({ error } = await supabaseClient.from("produtos").update(payload).eq("id", editandoId));
  } else {
    ({ error } = await supabaseClient.from("produtos").insert(payload));
  }

  btn.disabled = false;
  btn.textContent = "Publicar no catálogo";

  if (error) {
    erroEl.textContent = "Não foi possível salvar. Tente novamente.";
    erroEl.classList.add("show");
    console.error(error);
    return;
  }

  okEl.textContent = editandoId ? "Camiseta atualizada!" : "Camiseta publicada no catálogo!";
  okEl.classList.add("show");
  limparFormulario();
  carregarLista();
};

// ---------- LISTA / EDITAR / REMOVER ----------
async function carregarLista(){
  const lista = document.getElementById("lista-produtos");
  lista.innerHTML = `<p class="vazio">Carregando…</p>`;

  const { data, error } = await supabaseClient
    .from("produtos")
    .select("*")
    .order("criado_em", { ascending: false });

  if (error) {
    lista.innerHTML = `<p class="vazio">Erro ao carregar produtos.</p>`;
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    lista.innerHTML = `<p class="vazio">Nenhuma camiseta cadastrada ainda.</p>`;
    return;
  }

  lista.innerHTML = "";
  data.forEach(p=>{
    const item = document.createElement("div");
    item.className = "item-produto";
    const thumb = p.imagem_url
      ? `<img class="thumb" src="${p.imagem_url}" alt="">`
      : `<div class="thumb empty">+</div>`;
    item.innerHTML = `
      ${thumb}
      <div class="info">
        <div class="nome">${p.nome}</div>
        <div class="meta">${p.categoria} · ${(p.tamanhos||[]).join(", ")}${p.ativo ? "" : " · oculta"}</div>
        <div class="preco">R$ ${Number(p.preco).toFixed(2).replace(".",",")}</div>
      </div>
      <div class="acoes">
        <button class="icon-btn" data-acao="editar" title="Editar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn" data-acao="ocultar" title="${p.ativo ? "Tirar do catálogo" : "Mostrar no catálogo"}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${p.ativo ? '<path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-10-7-10-7a18.45 18.45 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 10 7 10 7a18.5 18.5 0 01-2.16 3.19M14.12 14.12a3 3 0 11-4.24-4.24"/><path d="M1 1l22 22"/>' : '<path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>'}</svg>
        </button>
        <button class="icon-btn del" data-acao="excluir" title="Excluir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg>
        </button>
      </div>`;
    item.querySelector('[data-acao="editar"]').onclick = ()=> editarProduto(p);
    item.querySelector('[data-acao="ocultar"]').onclick = ()=> alternarVisibilidade(p);
    item.querySelector('[data-acao="excluir"]').onclick = ()=> excluirProduto(p);
    lista.appendChild(item);
  });
}

function editarProduto(p){
  editandoId = p.id;
  document.getElementById("form-titulo").textContent = "Editando camiseta";
  document.getElementById("f-nome").value = p.nome;
  document.getElementById("f-categoria").value = p.categoria;
  document.getElementById("f-preco").value = p.preco;
  tamanhosSel.clear();
  document.querySelectorAll("#f-tamanhos .size-opt").forEach(b=>{
    const sel = (p.tamanhos||[]).includes(b.dataset.t);
    b.classList.toggle("sel", sel);
    if (sel) tamanhosSel.add(b.dataset.t);
  });
  if (p.imagem_url){
    previewImg.src = p.imagem_url;
    previewImg.style.display = "block";
  } else {
    previewImg.style.display = "none";
  }
  arquivoFoto = null;
  document.getElementById("btn-cancelar").style.display = "block";
  document.getElementById("btn-salvar").textContent = "Salvar alterações";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function alternarVisibilidade(p){
  const { error } = await supabaseClient.from("produtos").update({ ativo: !p.ativo }).eq("id", p.id);
  if (error) { console.error(error); return; }
  carregarLista();
}

async function excluirProduto(p){
  const confirmar = confirm(`Remover "${p.nome}" definitivamente do catálogo?`);
  if (!confirmar) return;
  const { error } = await supabaseClient.from("produtos").delete().eq("id", p.id);
  if (error) { console.error(error); return; }
  carregarLista();
}
</script>
